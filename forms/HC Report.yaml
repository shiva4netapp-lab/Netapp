- name: netapp_hc_report
  description: Generate NetApp ONTAP Health Check Report
  type: ansible

  categories:
    - Samba_Ansibleforms

  roles:
    - public

  playbook: netapp_hc_report.yml
  inventory: ""

  fields:
    - name: hostname
      label: Cluster Management IP / FQDN
      type: text
      required: true

    - name: username
      label: Username
      type: text
      required: true
      default: admin

    - name: password
      label: Password
      type: password
      required: true
      noLog: true

    - name: report_name
      label: Report Name
      type: text
      required: true
      default: health_check_report.txt

    - name: include_nodes
      label: Include Node Health
      type: checkbox
      default: true

    - name: include_aggrs
      label: Include Aggregate Health
      type: checkbox
      default: true

    - name: include_volumes
      label: Include Volume Health
      type: checkbox
      default: true

    - name: include_lifs
      label: Include LIF Health
      type: checkbox
      default: true

    - name: include_snapmirror
      label: Include SnapMirror Status
      type: checkbox
      default: true
