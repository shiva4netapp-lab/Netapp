- name: create_ontap_svm
  description: Create new NetApp ONTAP SVM using Ansible
  type: ansible
  roles:
    - public
  categories:
    - Samba_Ansibleforms
  playbook: create_svm.yml
  inventory: ""

  fields:
    - name: hostname
      label: Cluster Management IP / FQDN
      type: text
      required: true

    - name: username
      label: Username
      type: text
      required: true
      default: admin

    - name: password
      label: Password
      type: password
      required: true
      noLog: true

    - name: svm_name
      label: SVM / Vserver Name
      type: text
      required: true
      placeholder: svm_nas01

    - name: root_volume_aggregate
      label: Root Volume Aggregate
      type: text
      required: true
      placeholder: aggr1

    - name: security_style
      label: Root Volume Security Style
      type: text
      required: true
      default: unix
      placeholder: unix / ntfs / mixed

    - name: allowed_protocols
      label: Allowed Protocols
      type: text
      required: true
      default: nfs,cifs
      placeholder: nfs,cifs

    - name: ipspace
      label: IPspace
      type: text
      required: true
      default: Default
