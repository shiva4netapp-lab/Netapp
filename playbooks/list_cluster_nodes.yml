---
- name: List ONTAP Cluster Nodes and Generate HTML Report
  hosts: localhost
  gather_facts: false

  collections:
    - netapp.ontap

  vars:
    report_file: "/app/dist/persistent/netapp_node_info_report.html"

  tasks:
    - name: Gather ONTAP cluster node information
      netapp.ontap.na_ontap_info:
        state: info
        gather_subset:
          - cluster_node_info
        hostname: "{{ hostname }}"
        username: "{{ username }}"
        password: "{{ password }}"
        https: true
        validate_certs: false
      register: ontap_info

    - name: Generate HTML node report
      ansible.builtin.copy:
        dest: "{{ report_file }}"
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>NetApp ONTAP Node Report</title>
              <style>
                  body {
                      font-family: Arial, sans-serif;
                      margin: 30px;
                      background-color: #f5f7fa;
                  }
                  h1 {
                      color: #003366;
                  }
                  table {
                      border-collapse: collapse;
                      width: 100%;
                      background-color: white;
                  }
                  th {
                      background-color: #0078d4;
                      color: white;
                      padding: 10px;
                      border: 1px solid #ddd;
                  }
                  td {
                      padding: 10px;
                      border: 1px solid #ddd;
                  }
                  .healthy {
                      color: green;
                      font-weight: bold;
                  }
                  .nothealthy {
                      color: red;
                      font-weight: bold;
                  }
              </style>
          </head>
          <body>
              <h1>NetApp ONTAP Cluster Node Information Report</h1>

              <p><b>Cluster Hostname/IP:</b> {{ hostname }}</p>
              <p><b>Generated By:</b> AnsibleForms</p>

              <table>
                  <tr>
                      <th>Node Name</th>
                      <th>Node UUID</th>
                      <th>Healthy</th>
                      <th>Eligible</th>
                      <th>Epsilon</th>
                  </tr>

                  {% for node_name, node_data in ontap_info.ontap_info.cluster_node_info.items() %}
                  <tr>
                      <td>{{ node_data.node_name }}</td>
                      <td>{{ node_data.node_uuid }}</td>

                      {% if node_data.is_node_healthy == "true" %}
                      <td class="healthy">{{ node_data.is_node_healthy }}</td>
                      {% else %}
                      <td class="nothealthy">{{ node_data.is_node_healthy }}</td>
                      {% endif %}

                      <td>{{ node_data.is_node_eligible }}</td>
                      <td>{{ node_data.is_node_epsilon }}</td>
                  </tr>
                  {% endfor %}
              </table>
          </body>
          </html>

    - name: Show HTML report location
      ansible.builtin.debug:
        msg:
          - "HTML report generated successfully."
          - "Report file path inside container: {{ report_file }}"
