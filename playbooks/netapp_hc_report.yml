---
- name: NetApp Health Check Report
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Generate HTML Report
      copy:
        dest: "/srv/apps/ansibleforms-docker-v6/data/repositories/Netapp/reports/{{ hostname }}_HC_Report.html"
        content: |
          <!DOCTYPE html>
          <html>
          <body>
          <h1>NetApp Health Check Report</h1>
          <p>Cluster: {{ hostname }}</p>
          </body>
          </html>

    - name: Show Report Path
      debug:
        msg: "Report saved successfully"
